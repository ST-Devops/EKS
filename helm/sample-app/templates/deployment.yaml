apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nginx-app.fullname" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      template:
        metadata:
          annotations:
            sidecar.istio.io/proxyCPU: "100m"
            sidecar.istio.io/proxyMemory: "128Mi"
            sidecar.istio.io/proxyCPULimit: "200m"
            sidecar.istio.io/proxyMemoryLimit: "256Mi"

    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi