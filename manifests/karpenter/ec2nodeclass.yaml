apiVersion: karpenter.k8s.aws/v1  
kind: EC2NodeClass
metadata:
  name: default
spec:
spec:
  amiFamily: AL2023  
  amiSelectorTerms:
    - alias: al2023@latest
  role: KarpenterNodeRole
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: eks-learning
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: eks-learning