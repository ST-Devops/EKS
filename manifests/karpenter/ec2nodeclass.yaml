apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2
  role: KarpenterNodeRole   # <-- make sure this exists!
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: <your-cluster-name>
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: <your-cluster-name>