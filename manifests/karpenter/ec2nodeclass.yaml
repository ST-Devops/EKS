apiVersion: karpenter.k8s.aws/v1   # ✅ FIX HERE
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2
  amiSelectorTerms:
    - alias: al2@latest
  role: KarpenterNodeRole
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: eks-learning
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: eks-learning