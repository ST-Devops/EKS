apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2023

  amiSelectorTerms:
    - alias: al2023@latest

  instanceProfile: KarpenterNodeInstanceProfile-eks-learning

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: eks-learning

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: eks-learning